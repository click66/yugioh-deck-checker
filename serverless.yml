service: yugioh-deck-checker

frameworkVersion: "4"

provider:
  name: aws
  region: eu-west-2
  deploymentBucket:
    name: serverless-framework-deployments-eu-west-2-64e991aa-8c1a
  ecr:
    images:
      api:
        path: ./api
        file: Dockerfile
        platform: linux/amd64
      consistency:
        path: ./functions/consistency
        file: Dockerfile
        platform: linux/amd64

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource: "arn:aws:dynamodb:${self:provider.region}:*:table/yugioh-deck-checker-*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: "arn:aws:lambda:${self:provider.region}:${aws:accountId}:function:yugioh-deck-checker-*"

functions:
  api:
    image:
      name: api
    timeout: 30
    memorySize: 1024
    environment:
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
  consistency:
    image:
      name: consistency
    environment:
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    timeout: 300

custom:
  frontend:
    bucketName: "${self:service}-${opt:stage, 'prod'}-frontend"
    cloudFrontDomain: yugioh.clarksirl.com
    distributionFolder: ./frontend/dist
  s3Deploy:
    - bucket: "${self:custom.frontend.bucketName}"
      folder: "${self:custom.frontend.distributionFolder}"
      acl: public-read
      cacheControl: "max-age=31536000"

package:
  individually: true

resources:
  Resources:
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: "${self:custom.frontend.bucketName}"
        AccessControl: PublicRead
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
    FrontendDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Aliases:
            - ${self:custom.frontend.cloudFrontDomain}
          Origins:
            - Id: Frontend
              DomainName: !GetAtt FrontendBucket.DomainName
              S3OriginConfig:
                OriginAccessIdentity: ""
          DefaultCacheBehavior:
            TargetOriginId: Frontend
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: none
          ViewerCertificate:
            AcmCertificateArn: arn:aws:acm:us-east-1:${aws:accountId}:certificate/2a3f7b82-c78d-4531-b60e-a79b5ef4522d
            SslSupportMethod: sni-only
    JobsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: "${self:service}-${opt:stage, self:provider.stage, 'prod'}-jobs"
        AttributeDefinitions:
          - AttributeName: job_id
            AttributeType: S
        KeySchema:
          - AttributeName: job_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
