service: yugioh-deck-checker

frameworkVersion: "4"

provider:
  name: aws
  region: eu-west-2
  deploymentBucket:
    name: serverless-framework-deployments-eu-west-2-64e991aa-8c1a
  ecr:
    images:
      api:
        path: ./api
        file: Dockerfile
        platform: linux/amd64
      consistency:
        path: ./functions/consistency
        file: Dockerfile
        platform: linux/amd64

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource: "arn:aws:dynamodb:${self:provider.region}:*:table/yugioh-deck-checker-*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: "arn:aws:lambda:${self:provider.region}:${aws:accountId}:function:yugioh-deck-checker-*"

functions:
  api:
    image:
      name: api
    timeout: 30
    memorySize: 1024
    environment:
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
  consistency:
    image:
      name: consistency
    environment:
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    timeout: 300

resources:
  Resources:
    JobsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: "${self:service}-${opt:stage, self:provider.stage, 'prod'}-jobs"
        AttributeDefinitions:
          - AttributeName: job_id
            AttributeType: S
        KeySchema:
          - AttributeName: job_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
