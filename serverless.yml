service: yugioh-deck-checker

frameworkVersion: "4"

provider:
  name: aws
  region: eu-west-2
  deploymentBucket:
    name: serverless-framework-deployments-eu-west-2-64e991aa-8c1a
  ecr:
    images:
      api:
        path: ./api
        file: Dockerfile
        platform: linux/amd64
      consistency:
        path: ./functions/consistency
        file: Dockerfile
        platform: linux/amd64
      load-card-database:
        path: ./functions/load-card-database
        file: Dockerfile
        platform: linux/amd64

  apiGateway:
    minimumCompressionSize: 1024
    metrics: true
    throttle:
      rateLimit: 100 # requests per second
      burstLimit: 50 # max concurrent bursts

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource: "arn:aws:dynamodb:${self:provider.region}:*:table/yugioh-deck-checker-*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: "arn:aws:lambda:${self:provider.region}:${aws:accountId}:function:yugioh-deck-checker-*"
        - Effect: Allow
          Action:
            - sqs:GetQueueUrl
            - sqs:SendMessage
          Resource:
            - !GetAtt JobQueue.Arn

functions:
  api:
    image:
      name: api
    timeout: 30
    memorySize: 1024
    reservedConcurrency: 20 # protect against abuse
    environment:
      AWS_ACCOUNT_ID: !Ref "AWS::AccountId"
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY

  consistency:
    image:
      name: consistency
    environment:
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    events:
      - sqs:
          arn: !GetAtt JobQueue.Arn
          batchSize: 1
    memorySize: 2048
    timeout: 300
    reservedConcurrency: 10 # limit async jobs triggered

  load-card-database:
    image:
      name: load-card-database
    timeout: 300
    environment:
      ENV_PREFIX: "${self:service}-${opt:stage, self:provider.stage, 'prod'}"
    events:
      - schedule:
          name: "${self:service}-${opt:stage, self:provider.stage, 'prod'}-daily-load-card-database"
          description: "Runs load-card-database Lambda every midnight UTC"
          rate: cron(0 0 * * ? *)
          enabled: true
    iamRoleStatements:
      - Effect: Allow
        Action:
          - s3:PutObject
        Resource:
          - "arn:aws:s3:::${self:custom.card-database.bucketName}/*"
          - "arn:aws:s3:::${self:custom.frontend.bucketName}/data/*"
          - "arn:aws:s3:::${self:custom.frontend.bucketName}/database-latest.json"

custom:
  card-database:
    bucketName: "${self:service}-${opt:stage, 'prod'}-card-database"
  frontend:
    bucketName: "${self:service}-${opt:stage, 'prod'}-frontend"
    cloudFrontDomain: yugioh.clarksirl.com
    distributionFolder: ./frontend/dist
  s3Deploy:
    - bucket: "${self:custom.frontend.bucketName}"
      folder: "${self:custom.frontend.distributionFolder}"
      cacheControl: "max-age=31536000"

package:
  individually: true

resources:
  Resources:
    JobQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: "${self:service}-${opt:stage, self:provider.stage, 'prod'}-consistency"
        VisibilityTimeout: 900 # 15 minutes
        MessageRetentionPeriod: 345600 # 4 days

    CardDatabaseBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: "${self:custom.card-database.bucketName}"
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedMethods:
                - GET
              AllowedOrigins:
                - "https://${self:custom.frontend.cloudFrontDomain}"
              AllowedHeaders:
                - "*"

    CloudFrontOAI:
      Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
      Properties:
        CloudFrontOriginAccessIdentityConfig:
          Comment: "OAI for yugioh-deck-checker frontend"

    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: "${self:custom.frontend.bucketName}"
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    JobsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: "${self:service}-${opt:stage, self:provider.stage, 'prod'}-jobs"
        AttributeDefinitions:
          - AttributeName: job_id
            AttributeType: S
          - AttributeName: batch_id
            AttributeType: S
        KeySchema:
          - AttributeName: job_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: batch_id-index
            KeySchema:
              - AttributeName: batch_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

  Outputs:
    FrontendBucketName:
      Value: !Ref FrontendBucket
      Export:
        Name: FrontendBucketName
    ApiEndpoint:
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${opt:stage, self:provider.stage, 'prod'}"
      Export:
        Name: ApiEndpoint
